<!DOCTYPE html>
<html>

<head>
    <title>welcome</title>
    <style>
        h1{
            text-align: center;
        }
        #main-image {
            height: 250px;
            border-radius: 10px;
        }

        .gallary-container {
            margin: 10px auto;
            width: fit-content;
            display: flex;
            align-items: center;
        }

        .btn {
            height: 20px;
            width: 60px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid black;
            text-align: center;
        }

        .preview-img {
            height: 100px;
            width: 100px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 5px;
        }

        .gallery-preview {
            display: flex;
            overflow-x: scroll;
            width: 40%;
            margin: 0 auto;
            align-self: center;
            justify-content: space-around;
        }

        .info {
            margin: auto;
            width: 500px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Image Gallery</h1>
    <div class="gallary-container">
        <span id="back" class="btn" onclick="back()">Back</span>
        <img src="https://images.unsplash.com/photo-1624651208388-f8726eace8f2" id="main-image" alt="Image 1" />
        <span id="next" class="btn" onclick="next()">Next</span>
    </div>
    <div class="info">
        <h3 id="title">Yoga Mat</h3>
        <p id="description">Yoga mats are specially fabricated mats used to prevent hands and feet slipping during asana
            practice in modern yoga as exercise.</p>
    </div>

    <div class="gallery-preview" id="gallery-preview"></div>

    <script>
        const IMAGES = [
            {
                url: "https://images.unsplash.com/photo-1624651208388-f8726eace8f2",
                title: "Yoga Mat",
                description: "Yoga mats are specially fabricated mats used to prevent hands and feet slipping during asana practice in modern yoga as exercise.",
            },
            {
                url: "https://images.unsplash.com/photo-1683758507025-6e74ad3ca1e5",
                title: "Yoga Mat",
                description: "Yoga mat is a standard, versatile exercise mat favored for its balance between portability, cushioning, and stability.",
            },
            {
                url: "https://images.unsplash.com/photo-1646239646963-b0b9be56d6b5",
                title: "Yoga Mat",
                description: "Yoga mat is often constructed from materials like EVA foam, TPE, or PVC, providing a lightweight and durable option for daily practice.",
            },
            {
                url: "https://images.unsplash.com/photo-1591291621164-2c6367723315",
                title: "Yoga Mat",
                description: "Especially in standing poses, a dependable mat can allow you to hone in on perfecting your alignment and posture rather than worrying about an accidental slip.",
            },
        ];

        let currentIndex = 0;

        function ShowCurrentImage() {
            const imageElement = document.getElementById("main-image");
            const headerElement = document.getElementById("title");
            const descriptionElement = document.getElementById("description");

            const currentImage = IMAGES[currentIndex];

            imageElement.src = currentImage.url;
            headerElement.innerText = currentImage.title;
            descriptionElement.innerText = currentImage.description;
        }

        function back() {
            if (currentIndex > 0) {
                currentIndex--;
            } else {
                currentIndex = IMAGES.length - 1;
            }
            ShowCurrentImage();
        }

        function next() {
            if (currentIndex < IMAGES.length - 1) {
                currentIndex++;
            } else {
                currentIndex = 0;
            }
            ShowCurrentImage();
        }

        function showImage(index) {
            currentIndex = index;
            ShowCurrentImage();
        }
        function galleryPreview() {
            const galleryPreviewContainer = document.getElementById("gallery-preview");

            galleryPreviewContainer.innerHTML = "";

            for (let i = 0; i < IMAGES.length; i++) {
                // const currentImg = IMAGES[i];
                galleryPreviewContainer.innerHTML +=
                    `<img src='${IMAGES[i].url}' onclick='showImage(${i})' class='preview-img'/>`
            }
        }
        galleryPreview();
    </script>
</body>

</html>
