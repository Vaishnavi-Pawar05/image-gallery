<!DOCTYPE html>
<html>

<head>
    <title>welcome</title>
    <style>
        #main-image {
            width: 500px;
            border-radius: 10px;
        }

        .main-gallary {
            margin: auto;
            width: fit-content;
            display: flex;
            justify-items: center;
        }

        .btn {
            border: none;
            border-radius: 50%;
            background-color: brown;
            color: white;
            height: 30px;
            align-self: center;

        }
    </style>
</head>

<body>
    <div class="main-gallary">
        <button id="back" class="btn" onclick="back()">Back</button>
        <img src="https://images.unsplash.com/photo-1624651208388-f8726eace8f2?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fHlvZ2ElMjBtYXR8ZW58MHx8MHx8fDA%3D" id="main-image" />
        <button id="next" class=" btn" onclick="next()">Next</button>
    </div>
    <script>

        let currentIndex = 0;
        
        let images = [
        "https://images.unsplash.com/photo-1683758507025-6e74ad3ca1e5?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fHlvZ2ElMjBtYXR8ZW58MHx8MHx8fDA%3D", 
        "https://images.unsplash.com/photo-1646239646963-b0b9be56d6b5?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8eW9nYSUyMG1hdHxlbnwwfHwwfHx8MA%3D%3D", 
        "https://images.unsplash.com/photo-1591291621164-2c6367723315?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8eW9nYSUyMG1hdHxlbnwwfHwwfHx8MA%3D%3D"];
        function ShowCurrentImage() {
            const showImage = document.getElementById("main-image");
            showImage.src = images[currentIndex];
        }

        function next() {
            if (currentIndex < images.length - 1) {
                currentIndex++;
            }else
            {
                currentIndex = 0;
            }
            ShowCurrentImage();
        }
        function back() {
            if (currentIndex > 0 ) {
                currentIndex--;
            }else
            {
                currentIndex = images.length - 1;
            }
            ShowCurrentImage();
        }
        
    </script>
</body>

</html>
